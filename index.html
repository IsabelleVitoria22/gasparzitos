<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESITG • Gêneros de Filmes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height:100vh;

    background:
    radial-gradient(circle at top, rgba(229,9,20,0.35), transparent 40%),
    linear-gradient(135deg,#0a0a0a,#141414,#1c0000);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

/* LOGO */

.logo{
    width:280px;
    max-width:90%;
    margin-bottom:20px;

    filter:drop-shadow(0 0 20px rgba(229,9,20,0.7));

    animation:flutuar 3s ease-in-out infinite;
}

@keyframes flutuar{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }
}

/* CARD PRINCIPAL */

.card{
    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;

    padding:40px;

    box-shadow:
    0 0 25px rgba(229,9,20,0.25),
    0 0 60px rgba(0,0,0,0.5);
}

h1{
    color:#E50914;

    font-size:2.8rem;

    margin-bottom:10px;

    text-transform:uppercase;

    letter-spacing:3px;
}

.subtitulo{
    color:#d6d6d6;

    margin-bottom:35px;

    font-size:1.1rem;
}

/* BOTÕES */

.menu-container{
    display:grid;

    grid-template-columns:repeat(2, 1fr);

    gap:20px;
}

.btn-genero{
    text-decoration:none;

    color:white;

    background:linear-gradient(
        135deg,
        rgba(229,9,20,0.95),
        rgba(120,0,0,0.95)
    );

    padding:18px;

    border-radius:15px;

    font-size:1.2rem;

    font-weight:bold;

    transition:0.3s;

    box-shadow:0 5px 15px rgba(229,9,20,0.3);
}

.btn-genero:hover{
    transform:translateY(-5px) scale(1.03);

    box-shadow:
    0 10px 25px rgba(229,9,20,0.6);

    background:linear-gradient(
        135deg,
        #ff1e2d,
        #c00000
    );
}

/* CENTRALIZA O BOTÃO COMÉDIA */

.btn-comedia{
    grid-column:1 / 3;
    justify-self:center;
    width:50%;
}

/* RODAPÉ */

.footer{
    margin-top:30px;

    color:#999;

    font-size:0.9rem;
}

/* RESPONSIVO */

@media(max-width:700px){

    .menu-container{
        grid-template-columns:1fr;
    }

    .btn-comedia{
        grid-column:auto;
        width:100%;
    }

    h1{
        font-size:2rem;
    }

    .card{
        padding:25px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- Coloque aqui o nome do arquivo do seu logo -->
    <img src="logo-esitg.png" alt="Logo ESITG" class="logo">

    <div class="card">

        <h1>Gêneros de Filmes</h1>

        <p class="subtitulo">
            Escolha um gênero para explorar os filmes disponíveis
        </p>

        <div class="menu-container">

            <a class="btn-genero" href="paginas/aluno-Enzo.html">
                Ação
            </a>

            <a class="btn-genero" href="paginas/aluno-Gabriel.html">
                Terror
            </a>

            <a class="btn-genero" href="/paginas/aluno-ISABELLE.html">
                Romance
            </a>

            <a class="btn-genero" href="paginas/alunos-Stella.html">
                Fantasia
            </a>

            <a class="btn-genero btn-comedia" href="paginas/aluno-ThiagoGaspar.html">
                Comédia
            </a>

        </div>

        <div class="footer">
            ESITG © 2026 • Catálogo de Filmes
        </div>

    </div>

</div>

</body>
</html>
